  <!-- Service Worker registration (web only, not Capacitor native)
       - Registers /sw.js on load.
       - Actively checks for an update on every page load so new deploys
         propagate within one navigation cycle.
       - When a new SW finishes installing and is waiting, we post
         SKIP_WAITING so it activates immediately; on controllerchange
         we reload once to pick up the fresh assets.
       - Guards against reload loops with a sessionStorage flag. -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) return;

      var reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (reloaded) return;
        reloaded = true;
        // Give the new SW a beat to take over, then reload once.
        window.location.reload();
      });

      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').then(function (reg) {
          // Force an update check on every full page load — cheap and
          // guarantees we don't sit on a stale SW for days.
          try { reg.update(); } catch (e) {}

          function promoteWaiting(worker) {
            if (!worker) return;
            worker.postMessage({ type: 'SKIP_WAITING' });
          }

          // If a waiting worker already exists (previous visit installed
          // a new SW but user didn't close all tabs), promote it now.
          if (reg.waiting && navigator.serviceWorker.controller) {
            promoteWaiting(reg.waiting);
          }

          reg.addEventListener('updatefound', function () {
            var installing = reg.installing;
            if (!installing) return;
            installing.addEventListener('statechange', function () {
              if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                // A new SW is installed and there's an old controller —
                // this is the classic "new deploy shipped" case.
                promoteWaiting(installing);
              }
            });
          });
        }).catch(function (err) {
          if (typeof console !== 'undefined') console.warn('SW registration failed:', err);
        });
      });
    })();
  </script>
